<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Калькулятор авто</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    if (tg.platform === 'android' || tg.platform === 'ios') {
      tg.expand();
      tg.requestFullscreen();
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #06141B;
      color: #9BABAB;
    }

    /* ===== ЗАСТАВКА ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #06141B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      transition: opacity 0.7s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-gif {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .splash-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 20%,
        rgba(6,20,27,0.5) 60%,
        rgba(6,20,27,0.95) 100%
      );
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px 52px;
      animation: fadeUp 0.9s ease 0.4s both;
    }

    .splash-title {
      font-size: 30px;
      font-weight: 700;
      color: #CCD0CF;
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(155,171,171,0.4);
      margin-bottom: 6px;
    }

    .splash-subtitle {
      font-size: 12px;
      color: #4A5C6A;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .splash-bar-wrap {
      width: 140px;
      height: 2px;
      background: #11212D;
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
    }

    .splash-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4A5C6A, #9BABAB);
      border-radius: 4px;
      animation: loadBar 2s ease 0.5s forwards;
    }

    @keyframes loadBar {
      0% { width: 0%; }
      70% { width: 80%; }
      100% { width: 100%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
    #app {
      min-height: 100vh;
      padding: max(100px, env(safe-area-inset-top) + 60px) 16px calc(32px + env(safe-area-inset-bottom));
      opacity: 0;
      transition: opacity 0.5s ease;
      background: #06141B;
    }

    #app.visible { opacity: 1; }

    /* Шапка */
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .app-header-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #11212D;
      border: 1px solid #253745;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .app-header-text h1 {
      font-size: 30px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(122, 248, 255, 0.42);
    }

    .app-header-text p {
      font-size: 14px;
      color: #728492;
      letter-spacing: 0.5px;
    }

    /* Карточка */
    .card {
      background: #11212D;
      border: 1px solid #253745;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #bbd8ee;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid #253745;
      border-radius: 10px;
      font-size: 15px;
      background: #06141B;
      color: #CCD0CF;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      caret-color: #9BABAB;
    }

    input::placeholder { color: #253745; }

    input:focus {
      border-color: #4A5C6A;
      box-shadow: 0 0 0 3px rgba(74,92,106,0.15);
    }

    input:last-of-type { margin-bottom: 0; }

    /* Кнопка */
    button#calcBtn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #11212D, #253745);
      color: #CCD0CF;
      border: 1px solid #4A5C6A;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      margin-top: 16px;
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
    }

    button#calcBtn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #9BABAB, transparent);
      opacity: 0.3;
    }

    button#calcBtn:active {
      transform: scale(0.98);
      background: #253745;
    }

    button#calcBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Ошибка */
    .error-msg {
      color: #c0474a;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    /* Карточка результата */
    .result-card {
      background: #11212D;
      border: 1px solid #253745;
      border-radius: 16px;
      padding: 20px;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #4A5C6A, transparent);
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: #ffffffd4;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(155, 171, 171, 0.3);
    }

    .result-row:last-of-type { border-bottom: none; }

    .result-row .label { color: #4A5C6A; }

    .result-row .value {
      font-weight: 500;
      color: #ffffff;
    }

    .result-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0 2px;
      font-size: 20px;
      font-weight: 700;
      margin-top: 8px;
      border-top: 1px solid #253745;
    }

    .result-total .label-total { color: #4A5C6A; }

    .result-total .value-total {
      color: #7af8ff;
      text-shadow: 0 0 3px rgba(122, 248, 255, 0.9);
    }

    /* AI блок */
    .ai-block {
      display: none;
      margin-top: 16px;
      padding: 15px;
      background: #06141B;
      border-radius: 10px;
      border: 1px solid #253745;
      font-size: 15px;
      line-height: 1.7;
      color: #ffffff;
    }

    /* Ссылка специалиста */
    .specialist-link {
      display: inline-block;
      margin-top: 12px;
      color: #7af8ff;
      text-decoration: none;
      font-weight: 600;
      font-style: normal;
      border-bottom: 1px solid #253745;
      padding-bottom: 1px;
      transition: color 0.2s;
    }

    .specialist-link:active { color: #CCD0CF; }

    /* Разделитель */
    .neon-divider {
      width: 40px;
      height: 1px;
      background: #253745;
      border-radius: 2px;
      margin: 20px auto 0;
    }

    /* Лоадер */
    .loader {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid #253745;
      border-top-color: #9BABAB;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ЗАСТАВКА -->
  <div id="splash">
    <img src="/webapp/splash.gif" alt="" class="splash-gif" />
    <div class="splash-overlay"></div>
    <div class="splash-content">
      <div class="splash-title">Calc Bot</div>
      <div class="splash-subtitle">Авто из Кореи</div>
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <!-- ПРИЛОЖЕНИЕ -->
  <div id="app">

    <div class="app-header">
      <div class="app-header-icon">🚗</div>
      <div class="app-header-text">
        <h1>Калькулятор стоимости.</h1>
        <p>Импорт · Таможня · Доставка</p>
      </div>
    </div>

    <div class="card">
      <label>Модель автомобиля</label>
      <input type="text" id="model" placeholder="Например: Porsche 911" autocomplete="off" />

      <label>Цена автомобиля (USD)</label>
      <input type="number" id="price" placeholder="Например: 15000" min="1" />

      <p class="error-msg" id="errorMsg"></p>

      <button id="calcBtn" onclick="calculate()">Рассчитать стоимость</button>
    </div>

    <div class="result-card" id="resultCard">
      <p class="result-title" id="resultTitle">Расчёт</p>

      <div class="result-row">
        <span class="label">💰 Цена авто</span>
        <span class="value" id="rPrice">—</span>
      </div>
      <div class="result-row">
        <span class="label">🛃 Таможня (15%)</span>
        <span class="value" id="rCustoms">—</span>
      </div>
      <div class="result-row">
        <span class="label">🚚 Логистика</span>
        <span class="value" id="rLogistics">—</span>
      </div>
      <div class="result-row">
        <span class="label">💼 Комиссия (5%)</span>
        <span class="value" id="rCommission">—</span>
      </div>

      <div class="result-total">
        <span class="label-total">Итого</span>
        <span class="value-total" id="rTotal">—</span>
      </div>

      <div class="ai-block" id="aiText"></div>
      <div class="neon-divider"></div>
    </div>

  </div>

  <script>
    // Динамический отступ под шапку Telegram
    tg.onEvent('viewportChanged', () => {
      const app = document.getElementById('app');
      const topInset = tg.safeAreaInsets ? tg.safeAreaInsets.top : 0;
      const contentTop = tg.contentSafeAreaInsets ? tg.contentSafeAreaInsets.top : 0;
      app.style.paddingTop = Math.max(80, topInset + contentTop + 16) + 'px';
    });

    // Скрыть заставку
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        splash.classList.add('hidden');
        app.classList.add('visible');
        setTimeout(() => splash.remove(), 700);
      }, 2800);
    });

    function fmt(n) {
      return '$' + Number(n).toLocaleString('ru-RU', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    async function calculate() {
      hideError();

      const model = document.getElementById('model').value.trim();
      const priceRaw = document.getElementById('price').value.trim();

      if (!model) { showError('Введите модель автомобиля'); return; }
      if (!priceRaw) { showError('Введите цену'); return; }

      const price = parseFloat(priceRaw);
      if (isNaN(price) || price <= 0) {
        showError('Цена должна быть положительным числом');
        return;
      }

      const btn = document.getElementById('calcBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>Считаем...';
      document.getElementById('aiText').style.display = 'none';

      try {
        const res = await fetch('/calc-ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, price })
        });

        if (!res.ok) throw new Error('Ошибка сервера');
        const data = await res.json();
        if (data.error) { showError(data.error); return; }

        document.getElementById('resultTitle').textContent = `— ${model} —`;
        document.getElementById('rPrice').textContent = fmt(data.price);
        document.getElementById('rCustoms').textContent = fmt(data.customs);
        document.getElementById('rLogistics').textContent = fmt(data.logistics);
        document.getElementById('rCommission').textContent = fmt(data.commission);
        document.getElementById('rTotal').textContent = fmt(data.total);
        document.getElementById('resultCard').style.display = 'block';

        const aiBlock = document.getElementById('aiText');
        if (data.ai_text) {
          aiBlock.innerHTML = data.ai_text.replace(/\n/g, '<br>') + `
            <br><br>
            <a href="https://t.me/crazymixparty" target="_blank" class="specialist-link">
              ✉️ Связаться со специалистом
            </a>`;
          aiBlock.style.display = 'block';
        }

        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

      } catch (e) {
        showError('Не удалось получить расчёт. Попробуйте ещё раз.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Рассчитать стоимость';
      }
    }

    document.getElementById('price').addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>

</body>
</html>
