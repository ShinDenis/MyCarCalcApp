<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Калькулятор авто</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();

      if (tg.platform === 'android' || tg.platform === 'ios') {
        tg.expand();
      }
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
    }

    /* ===== SPLASH ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      transition: opacity 0.7s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-gif {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .splash-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 20%,
        rgba(0, 0, 0, 0.4) 60%,
        rgba(0, 0, 0, 0.92) 100%
      );
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px 52px;
      animation: fadeUp 0.9s ease 0.4s both;
    }

    .splash-title {
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.6);
    }

    .splash-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 6px 0 28px;
    }

    .splash-bar-wrap {
      width: 140px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
    }

    .splash-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffffff, #feffc9);
      animation: loadBar 2s ease 0.5s forwards;
    }

    @keyframes loadBar {
      to {
        width: 100%;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== APP ===== */
    #app {
      min-height: 100vh;
      padding: max(80px, env(safe-area-inset-top) + 60px) 16px
        calc(32px + env(safe-area-inset-bottom));
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #app.visible {
      opacity: 1;
    }

    .card,
    .result-card {
      background: #111;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: #0b2c30;
      color: #fff;
      cursor: pointer;
    }

    .ai-block {
      display: none;
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.6;
    }

    .specialist-link {
      display: block;
      margin-top: 6px;
      color: #00bfff;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div id="splash">
    <img src="/webapp/splash.gif" class="splash-gif" />
    <div class="splash-overlay"></div>

    <div class="splash-content">
      <div class="splash-title">Calc Bot</div>
      <div class="splash-subtitle">Авто из Кореи</div>

      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <div id="app">
    <div class="card">
      <input id="model" placeholder="Модель" />
      <input id="price" type="number" placeholder="Цена" />

      <button onclick="calculate()">Рассчитать</button>
    </div>

    <div class="result-card" id="resultCard">
      <div id="aiText" class="ai-block"></div>
    </div>
  </div>

  <script>
    function fmt(n) {
      return '$' + Number(n).toLocaleString('ru-RU');
    }

    async function calculate() {
      const model = document.getElementById('model').value.trim();
      const price = parseFloat(document.getElementById('price').value);

      if (!model || !price) return;

      const res = await fetch('/calc-ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, price })
      });

      const data = await res.json();

      const aiBlock = document.getElementById('aiText');

      if (data.ai_text) {
        aiBlock.innerHTML = `
          <div>${data.ai_text.replace(/\n/g, '<br>')}</div>
          <a href="https://t.me/crazymixparty" target="_blank" class="specialist-link">
            ✉️ Связаться со специалистом
          </a>
        `;

        aiBlock.style.display = 'block';
      }

      document.getElementById('resultCard').style.display = 'block';
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').remove();
        document.getElementById('app').classList.add('visible');
      }, 2000);
    });
  </script>
</body>
</html>
